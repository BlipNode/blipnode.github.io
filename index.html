<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="BlipNode">
    <title>BlipNode</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/26aac9298c.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <div class="main-row">
            <div class="showcase">
                <img src="assets/images/showcase.png" height="650px" alt="Showcase">
            </div>

            <div class="content">
                <div class="logo">
                    <img src="assets/images/logo.png" height="100px" alt="MindFlip Logo">
                </div>

                <div class="texts">
                    <h1>MindFlip</h1>
                    <h2>Learn fast. Remember longer.</h2>
                </div>

                <div class="buttons">
                    <button id="google-play-button"><i class="fa-brands fa-google-play"></i>Google Play</button>
                </div>

                <p>Created by BlipNode</p>
            </div>
        </div>
    </div>
</body>

</html>
